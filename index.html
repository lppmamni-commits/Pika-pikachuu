                        Mulai Pengisian

        </div>
    </nav>

    <!-- Hero / Badge Section -->
    <section class="relative overflow-hidden pt-12 pb-8 px-4 sm:px-6 lg:px-8">

    <!-- Form Frame Section -->
    <section id="form-section" class="max-w-4xl w-full mx-auto px-4 pb-20 relative z-10 flex-grow">
        <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/80 border border-slate-100 overflow-hidden relative group">
            
            <!-- Custom Iframe Header (Status Bar) -->
            <div class="bg-slate-900 text-white px-6 py-4 flex items-center justify-between">

                <div class="flex items-center gap-1.5 text-xs font-medium text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    Pika..Pika...
                </div>
            </div>

            <!-- Google Form Embedded Container -->
            <div class="relative w-full bg-slate-50" style="height: 800px;">
                <!-- Loading Skeleton -->
                <div id="form-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 gap-4 transition-opacity duration-500">
                    <div class="relative">
                        <div class="w-16 h-16 border-4 border-yellow-200 border-t-yellow-400 rounded-full animate-spin"></div>
                        <img src="https://blogger.googleusercontent.com/img/a/AVvXsEgVSc4MNeYUuXM7LrfXj9UvCoabHPk3Wvj9uXXfu1xWyjkAeI3TNwSE2N8awRb5HJdA5H3TSZ1_2i2UF-XxArcladK-iPXQWcgYP0NuGFUWb3zdj0pQ68miG6PgyC0nnUfKc8VXFuVEIxNbs6nYXOq5ZQdtplBx6ovu_MoqLM7DdmNGdLKydrIs6zM2pi--" 
                             class="w-8 h-8 absolute inset-0 m-auto rounded-full object-contain" alt="Loader Center">
                    </div>
                    <p class="text-sm font-semibold text-slate-500 animate-pulse">Menghubungkan ke Google Form...</p>
                </div>

                <!-- Google Form Iframe -->
                <iframe 
                    id="google-form"
                    src="https://docs.google.com/forms/d/e/1FAIpQLSf0Vpb0HQYZLDuRFCytUMlQ6wdT4DNfQsZr3JjavAkYxvTCSg/viewform?embedded=true" 
                    class="absolute top-0 left-0 w-full h-full border-0 opacity-0 transition-opacity duration-500"
                    onload="hideLoader()"
                    allowfullscreen
                    title="Form Registrasi LPPM">
                    Memuat...
                </iframe>

        </div>
    </section>

    <!-- Minimalist Footer -->
    <footer class="bg-white border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-4 py-12 sm:px-6 lg:px-8 text-center">
            
            <!-- Custom Pikachu Helper Text and Button -->
            <div class="mb-8">
                <p class="text-slate-500 font-medium mb-4 text-sm sm:text-base">Pika...Pika...Pikachu...!!</p>
                <a href="https://wa.me/6289667747299" 
                   target="_blank" 
                   rel="noopener noreferrer" 
                   class="inline-flex items-center gap-2.5 px-6 py-3 bg-yellow-400 hover:bg-yellow-500 text-slate-900 font-bold rounded-full shadow-lg shadow-yellow-400/20 hover:shadow-xl hover:shadow-yellow-400/30 transition-all duration-300 transform hover:-translate-y-0.5">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.457L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.965C16.528 2.01 14.069.99 11.45.989c-5.438 0-9.861 4.37-9.865 9.801-.001 1.838.5 3.61 1.443 5.174l-1.02 3.719 3.82-.998z" />
                    </svg>

            <!-- Copyright Notice -->
            <div class="border-t border-slate-100 pt-8 text-xs text-slate-400">
                &copy; 2026 LPPM
            </div>
        </div>
    </footer>

    <!-- Script Loading Handler -->
    <script>
        function hideLoader() {
            const loader = document.getElementById('form-loader');
            const iframe = document.getElementById('google-form');
            if (loader && iframe) {
                loader.style.opacity = '0';
                iframe.style.opacity = '1';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }
        }
    </script>
</body>
</html>
